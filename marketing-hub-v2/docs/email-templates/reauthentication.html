<!--
  Dashboard: Authentication → Email Templates → Reauthentication
  Subject: Confirm it’s you — Marketing Hub
  Regenerate: node docs/email-templates/generate.mjs
-->
<!-- Shared branded header — keep identical across all Auth emails -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Confirm it’s you</title>
  </head>
  <body style="margin:0;padding:0;background:#f4f6f7;font-family:Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:#1a1a1a;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f6f7;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border-radius:12px;overflow:hidden;border:1px solid #e5e9eb;">
            <tr>
              <td style="background:#0b3a4a;padding:28px 32px;text-align:center;">
                <img
                  src="https://marketing.petersandmay.com/pm-group-logo.png"
                  alt="Peters &amp; May"
                  width="180"
                  style="display:inline-block;max-width:180px;height:auto;background:#ffffff;padding:10px 14px;border-radius:8px;"
                />
                <p style="margin:16px 0 0;font-size:13px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.75);">
                  Marketing Hub
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:32px;">
                <h1 style="margin:0 0 12px;font-size:22px;line-height:1.3;color:#0b3a4a;font-weight:600;">
                  Confirm it’s you
                </h1>
                <p style="margin:0 0 16px;font-size:15px;line-height:1.55;color:#334155;">Enter this code to confirm a sensitive change on your Marketing Hub account.</p>
                <table role="presentation" cellspacing="0" cellpadding="0">
                  <tr>
                    <td style="border-radius:8px;background:#0b3a4a;">
                      <a
                        href="https://marketing.petersandmay.com/login"
                        style="display:inline-block;padding:12px 22px;font-size:15px;font-weight:600;color:#ffffff;text-decoration:none;"
                      >
                        Open Marketing Hub
                      </a>
                    </td>
                  </tr>
                </table>
                <p style="margin:24px 0 0;font-size:28px;line-height:1.2;letter-spacing:0.2em;font-weight:700;color:#0b3a4a;text-align:center;">
                  {{ .Token }}
                </p>
                <p style="margin:16px 0 0;font-size:13px;line-height:1.5;color:#64748b;text-align:center;">
                  This code expires shortly.
                </p>
                
              </td>
            </tr>
            <tr>
              <td style="padding:16px 32px 24px;border-top:1px solid #e5e9eb;background:#fafbfc;">
                <p style="margin:0;font-size:12px;line-height:1.45;color:#94a3b8;text-align:center;">
                  Peters &amp; May · Marketing Hub<br />
                  <a href="https://marketing.petersandmay.com" style="color:#0b3a4a;text-decoration:none;">marketing.petersandmay.com</a>
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
